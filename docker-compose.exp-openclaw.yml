# Port overrides for OpenClaw experiments (parallel-safe)
# Usage: COMPOSE_PROJECT_NAME=openclaw-exp API_PORT=8792 \
#   docker compose -f docker-compose.yml -f docker-compose.openclaw.yml -f docker-compose.exp-openclaw.yml up -d
services:
  db:
    ports:
      - "5435:5432"
  openclaw:
    ports:
      - "18791:18789"
      - "18792:18790"
