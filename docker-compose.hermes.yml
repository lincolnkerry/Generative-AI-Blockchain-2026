# Hermes Agent + Privacy Router Demo
# Usage: docker compose -f docker-compose.yml -f docker-compose.hermes.yml up -d
# =============================================================================
# Extends the main docker-compose.yml with a Hermes Agent container.
# Hermes connects to Privacy Router as custom OpenAI-compatible endpoint + MCP.
# =============================================================================

services:
  hermes:
    build:
      context: .
      dockerfile: demo/hermes/Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - ./demo/hermes/config.yaml:/root/.hermes/config.yaml:ro
      - hermes-data:/root/.hermes
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      HERMES_ALLOW_ROOT_GATEWAY: "1"
      PRIVACY_ROUTER_URL: http://api:8787
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    env_file: .env
    depends_on:
      - api
    networks:
      - backend
    restart: unless-stopped

volumes:
  hermes-data:
