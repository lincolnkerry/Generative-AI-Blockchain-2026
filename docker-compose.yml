# Privacy Router — Core Services + Hermes Agent
#
# Minimal: db + api
# Full:    db + api + hermes
#
# Usage:
#   docker compose up -d                                    # all services
#   docker compose up -d db api                             # core only (no hermes)
#   docker compose -f docker-compose.yml -f docker-compose.openclaw.yml up -d        # + openclaw

#
# Hermes demo:
#   docker exec privacy-router-hermes-1 hermes -z "안녕하세요" --ignore-rules --accept-hooks
#
# Parallel-safe (custom ports):
#   API_PORT=8790 DB_PORT=5434 HERMES_PORT=7861 \
#     COMPOSE_PROJECT_NAME=hermes-demo \
#     docker compose up -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-privacy_router}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-privacy_router}
      POSTGRES_DB: ${POSTGRES_DB:-privacy_router}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-privacy_router}"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    ports:
      - "${API_PORT:-8787}:8787"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-privacy_router}:${POSTGRES_PASSWORD:-privacy_router}@db:5432/${POSTGRES_DB:-privacy_router}
    volumes:
      - ./.privacy-router.config.yaml:/app/.privacy-router.config.yaml
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  hermes:
    build:
      context: .
      dockerfile: hermes-agent/Dockerfile
    ports:
      - "${HERMES_PORT:-7860}:7860"
      - "9119:9119"
    volumes:
      - ./hermes-agent/config-${HERMES_CONFIG:-privacy-router}.yaml:/root/.hermes/config.yaml:ro
      - ./hermes-agent/SOUL.md:/root/.hermes/SOUL.md:ro
      - ./server/mcp/lightweight.py:/opt/hermes/server/mcp/lightweight.py:ro
      - ./docs:/workspace/docs:ro
      - ./usage-log:/workspace/usage-log
      - hermes-data:/root/.hermes
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      PRIVACY_ROUTER_URL: http://api:8787
      PRIVACY_ROUTER_API_KEY: ${PRIVACY_ROUTER_API_KEY:-pr-demo-key}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    env_file: .env
    depends_on:
      - api
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
  hermes-data:
