# Hermes Agent — Privacy Router Demo Configuration
# Tools: browser (playwright), filesystem, privacy-router MCP
# =============================================================================

model:
  provider: custom
  base_url: http://api:8787/v1
  api_key: "pr-D1RHd7yHooABh96hwt-G066ZLiqZ8mGcGMs2DL_LLOY"
  default: "privacy-router"

channels:
  telegram:
    enabled: false

# MCP Servers — tools available to the agent
mcp_servers:
  # Privacy Router: classify sensitive data, mask, route
  privacy-router:
    command: python
    args: ["/opt/hermes/server/mcp/lightweight.py"]
    env:
      PRIVACY_ROUTER_URL: "http://api:8787"
      PRIVACY_ROUTER_API_KEY: "pr-D1RHd7yHooABh96hwt-G066ZLiqZ8mGcGMs2DL_LLOY"
  # Browser automation via Playwright
  browser:
    command: npx
    args: ["-y", "@playwright/mcp", "--headless"]

  # Filesystem access for workspace
  filesystem:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]

# Memory configuration
memory:
  enabled: true
  backend: sqlite
  path: /root/.hermes/memory.db

# Skills to preload
skills:
  - agent-browser

# Hindsight: learn from past interactions
hindsight:
  enabled: true
  max_entries: 1000
