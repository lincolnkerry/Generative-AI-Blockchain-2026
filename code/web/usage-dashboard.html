<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Privacy Router — Usage Log Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
        .container{max-width:1200px;margin:0 auto;padding:2rem}
        h1{font-size:2rem;font-weight:700;color:#fff;margin-bottom:.5rem}
        .subtitle{color:#94a3b8;margin-bottom:2rem;font-size:.9rem}
        .grid{display:grid;gap:1.5rem}
        .grid-4{grid-template-columns:repeat(4,1fr)}
        .grid-2{grid-template-columns:repeat(2,1fr)}
        @media(max-width:768px){.grid-4,.grid-2{grid-template-columns:1fr}}
        .card{background:#1e293b;border:1px solid #334155;border-radius:1rem;padding:1.5rem}
        .card-hd{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:.5rem}
        .card-v{font-size:2.5rem;font-weight:700;color:#fff}
        .amber{color:#fbbf24}.blue{color:#60a5fa}.emerald{color:#34d399}
        .chart-box{position:relative;height:300px}
        .section{margin-top:2rem}
        .section-t{font-size:1.25rem;font-weight:600;color:#fff;margin-bottom:1rem}
        .badge{display:inline-block;padding:.125rem .5rem;border-radius:9999px;font-size:.75rem;font-weight:500}
        .b-sens{background:rgba(251,191,36,.2);color:#fbbf24}
        .b-safe{background:rgba(52,211,153,.2);color:#34d399}
        .b-local{background:rgba(96,165,250,.2);color:#60a5fa}
        .b-mask{background:rgba(16,185,129,.2);color:#10b981}
        .legend{display:flex;gap:1.5rem;margin-top:.75rem;flex-wrap:wrap}
        .legend-i{display:flex;align-items:center;gap:.375rem;font-size:.75rem;color:#94a3b8}
        .legend-d{width:10px;height:10px;border-radius:50%}
        .tl-row{display:flex;align-items:center;gap:1rem;padding:.5rem 0}
        .tl-date{width:80px;font-size:.8rem;color:#94a3b8;flex-shrink:0}
        .tl-bar{flex:1;height:32px;display:flex;border-radius:6px;overflow:hidden;background:#0f172a}
        .tl-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:#fff;min-width:20px}
        .seg-l{background:#3b82f6}.seg-m{background:#10b981}.seg-s{background:#6b7280}
        .footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid #334155;text-align:center;color:#475569;font-size:.75rem}
        .filter-bar{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
        .filter-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.375rem .75rem;border-radius:.5rem;font-size:.8rem;cursor:pointer;transition:all .15s}
        .filter-btn:hover,.filter-btn.active{background:#334155;color:#fff;border-color:#475569}
        .count-badge{background:#334155;color:#94a3b8;padding:.125rem .5rem;border-radius:9999px;font-size:.75rem;margin-left:.5rem}
        .ix-card{background:#1e293b;border:1px solid #334155;border-radius:1rem;overflow:hidden;margin-bottom:1rem;transition:border-color .15s}
        .ix-card:hover{border-color:#475569}
        .ix-header{padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;cursor:pointer;user-select:none}
        .ix-num{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:#0f172a;border-radius:.5rem;font-weight:700;font-size:.9rem;color:#fff;flex-shrink:0}
        .ix-meta{flex:1;min-width:0}
        .ix-title{font-weight:600;color:#fff;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ix-sub{font-size:.75rem;color:#94a3b8;margin-top:.125rem;display:flex;gap:.75rem;flex-wrap:wrap}
        .ix-badges{display:flex;gap:.375rem;flex-shrink:0}
        .ix-arrow{color:#475569;transition:transform .2s;flex-shrink:0}
        .ix-arrow.open{transform:rotate(180deg)}
        .ix-body{display:none;padding:0 1.5rem 1.5rem}
        .ix-body.open{display:block}
        .ix-section{margin-bottom:1.25rem}
        .ix-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:.5rem;font-weight:600}
        .ix-prompt{background:#0f172a;border:1px solid #334155;border-radius:.75rem;padding:1rem;font-size:.85rem;line-height:1.6;color:#e2e8f0;white-space:pre-wrap;word-break:break-word}
        .ix-response{background:#0f172a;border:1px solid #334155;border-radius:.75rem;padding:1rem;font-size:.85rem;line-height:1.6;color:#94a3b8;white-space:pre-wrap;word-break:break-word}
        .ix-response-raw{background:#0f172a;border:1px solid #f87171;border-left:4px solid #f87171;border-radius:.75rem;padding:1rem;font-size:.85rem;line-height:1.6;color:#fca5a5;white-space:pre-wrap;word-break:break-word}
        .ix-response-hydrated{background:#0f172a;border:1px solid #34d399;border-left:4px solid #34d399;border-radius:.75rem;padding:1rem;font-size:.85rem;line-height:1.6;color:#94a3b8;white-space:pre-wrap;word-break:break-word}
        .ix-records{display:flex;flex-wrap:wrap;gap:.5rem}
        .ix-record{background:#0f172a;border:1px solid #334155;border-radius:.5rem;padding:.5rem .75rem;display:flex;align-items:center;gap:.5rem;font-size:.8rem}

        .ess-false{background:rgba(52,211,153,.2);color:#34d399}
        .ix-highlight{background:rgba(251,191,36,.15);border-bottom:2px solid #fbbf24;padding:0 2px}

</head>

        </div></div>

                <button class="filter-btn" data-filter="masked">마스킹 후 외부 라우팅</button>
            </div>
            <div id="ixList"></div>
        </div></div>
    </div>
    <div class="footer">Privacy Router · Usage Log Dashboard · 실시간 DB 연동</div>
</div>

--------|---------------------------------------|---------------------------------------|\n| **동기화 방식**   | 비동기적으로 실행 (DOM 업데이트 후) | 동기적으로 실행 (DOM 업데이트 전)   |\n| **성능**           | 더 빠름 (비동기 처리로 인한 지연 최소화) | 느림 (DOM 업데이트 전 실행 → 렌더링 지연 가능) |\n| **사용 시점**      | 데이터 fetching, 상태 업데이트, 이벤트 핸들링 | 시각적 업데이트 (예: 레이아웃 계산, 색상 변경) |\n| **제약사항**      | DOM 업데이트가 완료된 후 실행 | DOM 업데이트 전 실행 → 렌더링 지연 가능 |\n\n---\n\n## **2. `useEffect`의 사용 사례**\n`useEffect`는 **비동기 작업**을 수행할 때 주로 사용됩니다.\n예를 들어:\n- API 데이터 fetching\n- 상태 변경 후의 이벤트 처리\n- DOM 업데이트가 완료된 후의 작업\n\n### **예제: API 데이터 로드**\n```jsx\nimport { useEffect, useState } from 'react';\n\nfunction UserProfile() {\n  const [userData, setUserData] = useState(null);\n\n  useEffect(() => {\n    fetch('https://api.example.com/user')\n      .then((res) => res.json())\n      .then((data) => setUserData(data));\n  }, []); // Empty dependency array → 한 번만 실행\n\n  return <div>{userData ? <p>{userData.name}</p> : <p>Loading...</p>}</div>;\n}\n```\n- `useEffect`는 **DOM 업데이트 후** 실행되므로, UI가 렌더링된 후 데이터를 가져옵니다.\n\n---\n\n## **3. `useLayoutEffect`의 사용 사례**\n`useLayoutEffect`는 **DOM 업데이트 전**에 실행되므로, **시각적 변화**를 즉시 반영할 때 사용됩니다.\n예를 들어:\n- 레이아웃 계산 (예: 요소 크기, 위치)\n- 색상 변경 (예: 화면이 즉시 업데이트되도록)\n- 하드웨어 접근 (예: 카메라, 스크린Shot)\n\n### **예제: 레이아웃 변경**\n```jsx\nimport { useLayoutEffect, useState } from 'react';\n\nfunction Box() {\n  const [width, setWidth] = useState(0);\n\n  useLayoutEffect(() => {\n    const element = document.querySelector('.box');\n    const newWidth = element.offsetWidth;\n    setWidth(newWidth); // DOM 업데이트 후에도 즉시 실행\n  }, []);\n\n  return <div className=\"box\" style={{ width: `${width}px` }}>Box</div>;\n}\n```\n- `useLayoutEffect`는 **DOM 업데이트 전**에 실행되므로, `width`가 즉시 업데이트됩니다.\n\n---\n\n## **4. 주의사항**\n### **`useLayoutEffect`의 문제점**\n- **렌더링 지연**: DOM 업데이트 전 실행되기 때문에, 다음 렌더링이 지연될 수 있습니다.\n  → **비동기 작업**을 `useLayoutEffect`에 넣으면, UI가 즉시 업데이트되지만, 다음 렌더링이 지연될 수 있습니다.\n- **성능 저하**: 비동기 작업이 `useLayoutEffect`에 들어갈 경우, 렌더링이 지연되므로, 성능에 악영향을 줄 수 있습니다.\n\n### **예제: 비동기 작업이 `useLayoutEffect`에 들어갈 경우**\n```jsx\nuseLayoutEffect(() => {\n  const element = document.querySelector('.box');\n  const newWidth = element.offsetWidth;\n  setTimeout(() => setWidth(newWidth)); // 비동기 작업 → 렌더링 지연 가능\n}, []);\n```\n→ 이 경우, `setTimeout`이 완료된 후만 `width`가 업데이트되므로, 다음 렌더링이 지연될 수 있습니다.\n\n---\n\n## **5. 최적의 사용 방법**\n| 작업 유형          | 사용 함수 | 예제 |\n|----------------------|------------|-------|\n| **데이터 fetching, 이벤트 핸들링** | `useEffect` | API 호출, 상태 업데이트 |\n| **레이아웃 계산 (DOM 업데이트 전)** | `useLayoutEffect` | 요소 크기, 위치, 색상 변경 |\n| **하드웨어 접근 (캐머라, 스크린샷)** | `useLayoutEffect` | `window.innerWidth` 계산 |\n\n---\n\n## **6. 요약**\n| 기능 | `useEffect` | `useLayoutEffect` |\n|------|------------|------------------|\n| **동기화** | 비동기 (DOM 업데이트 후) | 동기 (DOM 업데이트 전) |\n| **성능** | 빠름 | 느림 (렌더링 지연 가능) |\n| **사용 경우** | 데이터 fetching, 이벤트 핸들링 | 레이아웃 계산, 시각적 업데이트 |\n| **비동기 작업** | 안전 (렌더링 후) | 위험 (렌더링 지연) |\n\n### **결론**\n- **`useEffect`** → 데이터를 가져오거나 상태를 업데이트할 때 사용.\n- **`useLayoutEffect`** → DOM 업데이트 전 레이아웃을 계산할 때 사용.\n- **비동기 작업은 `useEffect`**로만 사용하고, `useLayoutEffect`에는 비동기 작업이 들어가지 않도록 주의하세요.\n\n---\n### **추가 참고**\n- `useEffect`는 **비동기 작업**을 수행할 때, `useLayoutEffect`는 **DOM 업데이트 전**에 실행되므로, **시각적 변화**를 즉시 반영할 때 사용합니다.\n- `useLayoutEffect`는 **렌더링 지연**의 위험이 있으므로, 성능에 민감한 애플리케이션에서는 피하는 것이 좋습니다.", "model_used": "openrouter/mistralai/ministral-3b-2512", "response_summary_html": "React에서 &#96;useEffect&#96;와 &#96;useLayoutEffect&#96;는 모두 컴포넌트 마운트 또는 렌더링 후 실행되는 **효과 함수**입니다. 그러나 두 함수의 주요 차이점은 **동기화 방식**과 **성능 및 사용 사례**에 있습니다.\n\n---\n\n## **1. &#96;useEffect&#96; vs. &#96;useLayoutEffect&#96;의 주요 차이점**\n| 특징               | &#96;useEffect&#96;                          | &#96;useLayoutEffect&#96;                     |\n|---------------------|---------------------------------------|---------------------------------------|\n| **동기화 방식**   | 비동기적으로 실행 (DOM 업데이트 후) | 동기적으로 실행 (DOM 업데이트 전)   |\n| **성능**           | 더 빠름 (비동기 처리로 인한 지연 최소화) | 느림 (DOM 업데이트 전 실행 → 렌더링 지 ot;apple&quot;, &quot;cherry&quot;, &quot;orange&quot;]\n\n# 정렬\nfruits.sort()  # [&quot;apple&quot;, &quot;cherry&quot;, &quot;orange&quot;]\n\n# 문자열 연결\ncombined = fruits + [&quot;kiwi&quot;]  # [&quot;apple&quot;, &quot;cherry&quot;, &quot;orange&quot;, &quot;kiwi&quot;]\nprint(combined)  # ['apple', 'cherry', 'orange', 'kiwi']\n&#96;&#96;&#96;\n\n---\n\n#### **튜플 (&#96;tuple&#96;)**\n- **변경 불가능** → 불변 데이터에 적합.\n- **메서드 사용 불가** (하지만 인덱싱, 슬라이싱 가능).\n- **키워드 인자로 사용** (딕셔너리 키, 함수 인자).\n- **문자열 연산 불가능** (문자열로 변환 후 사용).\n\n&#96;&#96;&#96;python\n# 튜플 생성\ncoordinates = (10, 20, 30)\n\n# 변경 불가능 (에러 발생)\n# coordinates.append(40)  # TypeError\n\n# 인덱싱 가능\nprint(coordinates[0])  # 10\n\n# 슬라이싱 가능\nprint(coordinates[1:3])  # (20, 30)\n\n# 딕셔너리 키로 사용 가능\npoint = {&quot;x&quot;: coordinates[0], &quot;y&quot;: coordinates[1]}\nprint(point)  # {'x': 10, 'y': 20}\n\n# 함수 인자로 사용\ndef process_point(x, y):\n    return x + y\n\nresult = process_point(*coordinates)  # 30\nprint(result)  # 30\n&#96;&#96;&#96;\n\n---\n\n### **3. 추가 비교**\n| 기능               | 리스트 (&#96;list&#96;) | 튜플 (&#96;tuple&#96;) |\n|---------------------|-----------------|----------------|\n| **생성**           | &#96;[]&#96;            | &#96;()&#96;           |\n| **메모리 사용**    | 높음            | 낮음          |\n| **속도**            | 느림            | 빠름          |\n| **사용 예시**       | 동적 데이터, 리스트 내보내기 | 불변 데이터, 키워드 인자 |\n\n---\n\n### **4. 언제 사용해야 할까?**\n- **리스트**를 사용하면:\n  - 데이터가 자주 변경될 때.\n  - 동적 크기의 데이터를 처리할 때.\n  - 문자열 연산이 필요할 때.\n\n- **튜플**를 사용하면:\n  - 데이터가 불변해야 할 때 (예: 딕셔너리 키, 함수 인자).\n  - 성능이 중요할 때 (빠름).\n  - 안전성 확보를 위해 불변성을 유지할 때.\n\n---\n### **예시 코드**\n&#96;&#96;&#96;python\n# 리스트 (변경 가능)\nshopping_cart = [&quot;apple&quot;, &quot;milk&quot;, &quot;bread&quot;]\nshopping_cart.append(&quot;egg&quot;)  # [&quot;apple&quot;, &quot;milk&quot;, &quot;bread&quot;, &quot;egg&quot;]\n\n# 튜플 (불변)\ncoordinates = (30, 40)\n# coordinates[0] = 100  # TypeError\n&#96;&#96;&#96;\n\n---\n### **요약**\n- **리스트** = **&quot;변경 가능&quot; + 동적 데이터** (리스트 내보내기, 문자열 연산 등).\n- **튜플** = **&quot;불변&quot; + 고성능** (딕셔너리 키, 함수 인자 등).\n\nPython은 둘 다 유용하지만, **데이터의 안정성**이 중요하면 튜플을, **동적 처리**가 필요하면 리스트를 사용합니다.", "masked_text": ""}, {"prompt_id": 19, "prompt": "Docker와 Kubernetes의 차이점과 각각의 장단점을 정리해주세요. 초보자를 위한 설명 부탁합니다.", "is_sensitive": false, "policy_action": "route_to_external", "records": [], "response_summary": "Docker와 Kubernetes는 모두 컨테이너화 환경에서 실행되는 애플리케이션을 관리하는 도구지만, 목적과 기능에서 큰 차이가 있습니다. 각자의 장단점을 이해하면 효율적으로 사용할 수 있습니다. 다음은 초보자를 위한 간단한 비교입니다.\n\n---\n\n### **1. Docker의 정의 및 역할**\n**Docker**는 **\"컨테이너 플랫폼\"**입니다.\n- **컨테이너**를 만들기 위한 도구입니다.\n- 단일 애플리케이션을 실행하는 lightweight 가상 환경인 **컨테이너**를 생성, 실행, 관리합니다.\n- **독립적 실행 환경**을 제공하여 애플리케이션을 다른 환경에서 동일한 방식으로 실행할 수 있게 합니다.\n\n---\n\n### **2. Kubernetes의 정의 및 역할**\n**Kubernetes (K8s)**는 **\"컨테이너 오케스트레이션\"** 도구입니다.\n- **여러 개의 컨테이너를 관리하는 시스템**입니다.\n- Docker가 단일 애플리케이션을 관리하는 데 사용되면, Kubernetes는 **여러 개의 컨테이너가 함께 작동하는 애플리케이션을 스케줄링, 배포, 관리**합니다.\n- **클라우드나 온프레미스 서버에서 스케일링, 자원 관리, 고가용성**을 제공합니다.\n\n---\n\n### **3. Docker vs. Kubernetes: 주요 차이점**\n\n| **요소**          | **Docker** | **Kubernetes** |\n|--------------------|------------|----------------|\n| **목적**          | 단일 컨테이너 애플리케이션을 실행하는 도구 | 여러 컨테이너를 관리하는 오케스트레이션 시스템 |\n| **관리 대상**     | 단일 애플리케이션 | 다중 애플리케이션 및 서비스 |\n| **스케일링**      | 수동으로 컨테이너를 실행 | 자동으로 컨테이너를 스케일링 (CPU, 메모리 등) |\n| **고가용성**      | 직접 구현 필요 | 내장된 재시도, 실패 처리, 복구 기능 |\n| **배포**          | 간단한 `docker run` 명령 | 복잡한 배포 스크립트 및 오케스트레이션 |\n| **자원 관리**     | 직접 관리 | 자동으로 자원을 할당 및 관리 |\n| **용도**          | 개발, 테스트, 간단한 배포 | 프로덕션 환경, 스케일링, 클러스터 관리 |\n\n---\n\n### **4. Docker의 장점**\n✅ **간편한 사용** : `docker run` 명령으로 간단히 컨테이너를 실행할 수 있습니다.\n✅ **경량화** : 가상 머신보다 더 가벼워서 빠른 실행이 가능합니다.\n✅ **독립적 실행** : 같은 Dockerfile로 다른 환경에서 동일한 애플리케이션을 실행할 수 있습니다.\n✅ **개발 및 테스트에 적합** : 개발자들에게 편리한 도구입니다.\n\n❌ **단점**\n- 단일 컨테이너만 관리할 수 있습니다.\n- 스케일링, 배포, 고가용성을 직접 구현해야 합니다.\n- 클러스터 관리 시 복잡성이 증가합니다.\n\n---\n\n### **5. Kubernetes의 장점**\n✅ **스케일링 및 자동화** : 수동으로 컨테이너를 관리하지 않고도 자동으로 스케일링할  프로덕션, 클러스터 관리 |\n\n---\n\n### **8. 초보자가 Docker와 Kubernetes를 어떻게 시작할까?**\n1. **Docker 사용하기**\n   - Docker를 설치하고 `docker run` 명령으로 간단히 컨테이너를 실행해보세요.\n   - 예시: `docker run -d nginx` → Nginx 서버를 실행합니다.\n\n2. **Kubernetes 시작하기**\n   - Docker와 달리 Kubernetes는 클러스터를 구성해야 합니다.\n   - 간단한 배포를 위해 **Minikube** (로컬에서 Kubernetes를 실행하는 도구)를 설치하고 테스트해보세요.\n   - 예시: `minikube start` → 로컬 Minikube 클러스터를 시작합니다.\n   - `kubectl run nginx --image=nginx` → Nginx Pod를 생성합니다.\n\n---\n\n### **9. 요약**\n- **Docker** → **\"컨테이너를 실행하는 도구\"** (개발, 테스트, 간단한 배포)\n- **Kubernetes** → **\"여러 컨테이너를 관리하는 오케스트레이션 시스템\"** (프로덕션, 스케일링, 고가용성)\n\n**초보자가 먼저 시작하는 순서**\n1. Docker → 간단한 컨테이너 실행\n2. Kubernetes → Minikube로 로컬 클러스터 테스트\n\n---\n이렇게 두 도구의 차이를 이해하면 Docker와 Kubernetes를 적절히 활용할 수 있습니다! 🚀", "response_raw_html": "Docker와 Kubernetes는 모두 컨테이너화 환경에서 실행되는 애플리케이션을 관리하는 도구지만, 목적과 기능에서 큰 차이가 있습니다. 각자의 장단점을 이해하면 효율적으로 사용할 수 있습니다. 다음은 초보자를 위한 간단한 비교입니다.\n\n---\n\n### **1. Docker의 정의 및 역할**\n**Docker**는 **&quot;컨테이너 플랫폼&quot;**입니다.\n- **컨테이너**를 만들기 위한 도구입니다.\n- 단일 애플리케이션을 실행하는 lightweight 가상 환경인 **컨테이너**를 생성, 실행, 관리합니다.\n- **독립적 실행 환경**을 제공하여 애플리케이션을 다른 환경에서 동일한 방식으로 실행할 수 있게 합니다.\n\n---\n\n### **2. Kubernetes의 정의 및 역할**\n**Kubernetes (K8s)**는 **&quot;컨테이너 오케스트레이션&quot;** 도구입니다.\n- **여러 개의 컨테이너를 관리하는 시스템**입니다.\n- Docker가 단일 애플리케이션을 관리하는 데 사용되면, Kubernetes는 **여러 개의 컨테이너가 함께 작동하는 애플리케이션을 스케줄링, 배포, 관리**합니다.\n- **클라우드나 온프레미스 서버에서 스케일링, 자원 관리, 고가용성**을 제공합니다.\n\n---\n\n### **3. Docker vs. Kubernetes: 주요 차이점**\n\n| **요소**          | **Docker** | **Kubernetes** |\n|--------------------|------------|----------------|\n| **목적**          | 단일 컨테이너 애플리케이션을 실행하는 도구 | 여러 컨테이너를 관리하는 오케스트레이션 시스템 |\n| **관리 대상**     | 단일 애플리케이션 | 다중 애플리케이션 및 서비스 |\n| **스케일링**      | 수동으로 컨테이너를 실행 | 자동으로 컨테이너를 스케일링 (CPU, 메모리 등) |\n| **고가용성**      | 직접 구현 필요 | 내장된 재시도, 실패 처리, 복구 기능 |\n| **배포**          | 간단한 &#96;docker run&#96; 명령 | 복잡한 배포 스크립트 및 오케스트레이션 |\n| **자원 관리**     | 직접 관리 | 자동으로 자원을 할당 및 관리 |\n| **용도**          | 개발, 테스트, 간단한 배포 | 프로덕션 환경, 스 ure`가 `&mut self`를 참조할 수 없습니다.\n- 따라서 `Future`는 **고정(immutable)**되어야 Tokio가 폴링할 수 있습니다.\n\n### **pin! 매크로**\nTokio는 `pin!` 매크로를 제공하여 `Future`를 핀합니다:\n```rust\nuse tokio::pin;\n\nfn main() {\n    let future = async { 42 };\n    pin!(future); // 핀을 적용\n    // future는 이제 Tokio가 폴링할 수 있습니다.\n}\n```\n\n### **pin!의 동작 원리**\n- `pin!`은 `Future`를 **`Pin<Box<dyn Future>>`**로 변환합니다.\n- Tokio는 이 핀된 `Future`를 **이벤트 루프에 추가**하여 폴링합니다.\n\n### **예시: 핀을 사용한 폴링**\n```rust\nuse tokio::task::JoinHandle;\n\nasync fn async_task() -> i32 {\n    42\n}\n\nfn main() {\n    let handle: JoinHandle<i32> = tokio::spawn(async_task);\n    // 핀된 Future를 폴링하기 위해 JoinHandle을 사용\n    let result = handle.await.unwrap();\n    println!(\"Result: {}\", result);\n}\n```\n- `tokio::spawn`은 `Future`를 핀하여 Tokio의 이벤트 루프에 추가합니다.\n- `handle.await`는 `Future`를 폴링하여 완료된 값을 가져옵니다.\n\n---\n\n## 4. **Tokio의 핀과 폴링의 결합**\nTokio는 다음과 같이 핀과 폴링을 조합하여 비동기 작업을 처리합니다:\n\n1. **`Future`를 핀(pin)** → `Pin<Box<dyn Future>>`로 변환.\n2. **이벤트 루프에 추가** → 폴링 루프가 주기적으로 상태를 체크.\n3. **완료 시 콜백** → `Poll::Ready`가 발생하면 작업이 실행됩니다.\n\n### **예시: 폴링을 직접 확인하는 코드**\n```rust\nuse tokio::task::JoinHandle;\nuse std::pin::Pin;\n\nasync fn async_task() -> i32 {\n    42\n}\n\nfn main() {\n    let handle: JoinHandle<i32> = tokio::spawn(async_task);\n\n    // 핀된 Future를 직접 폴링\n    let mut future = Pin::new(&mut handle);\n    println!(\"Polling...\");\n    let poll_result = future.poll().unwrap(); // Poll::Pending\n    println!(\"Pending\");\n\n    // Tokio의 이벤트 루프가 폴링을 다시 시도\n    tokio::task::yield_now().await; // 이벤트 루프가 다시 폴링\n    let poll_result = future.poll().unwrap(); // Poll::Ready\n    println!(\"Ready: {}\", future.get_ref().unwrap().unwrap());\n}\n```\n- `Pin::new`은 `Future`를 핀합니다.\n- `future.poll()`은 상태를 체크합니다.\n- `tokio::task::yield_now()`은 Tokio의 이벤트 루프를 강제로 폴링합니다.\n\n---\n\n## 5. **핀과 폴링의 핵심 이점**\n| 개념          | 역할                                                                 |\n|---------------|------------------------------------------------------------------------|\n| **핀(pin)**  | `Future`를 고정하여 Tokio가 폴링할 수 있도록 합니다.                 |\n| **폴링(polling)** | Tokio가 주기적으로 `Future`의 상태를 체크하여 완료된 작업을 실행. |\n\n### **이점**\n1. **Rust의 타입 시스템을 준수** → `Future`가 `&mut self`를 참조하지 않음.\n2. **효율적인 이벤트 루프** → 폴링을 통해 비동기 작업을 처리.\n3. **비동기 코루틴을 지원** → `async/await`를 통해 간편한 비동기 코딩 가능.\n\n---\n\n## 6. **실제 Tokio의 폴링 과정**\nTokio의 이벤트 루프는 다음과 같이 동작합니다:\n\n1. **작업 큐에 추가** → `tokio::spawn`이나 `tokio::task::spawn_local`으로 핀된 `Future`가 추가됨.\n2. **폴링 루프**:\n   - 루프가 시작될 때, 모든 핀된 `Future`를 폴링합니다.\n   - `Poll::Pending` → 작업이 완료되지 않음 → 다시 폴링.\n   - `Poll::Ready` → 작업이 완료 → 콜백이 실행됨.\n3. **완료된 작업 처리** → 콜백이 실행되고, 다음 작업이 폴링됨.\n\n### **예시: Tokio의 이벤트 루프 구조**\n```rust\n// Tokio의 이벤트 루프는 다음과 같이 동작\nloop {\n    for future in futures::pin_mut!(futures::stream::iter(\n        // 핀된 Future들을 가져옴\n    )) {\n        match future.poll() {\n            Ok(Poll::Ready(value)) => {\n                // 완료된 작업 실행\n                let result = future.unwrap();\n                // 콜백 실행\n            }\n            Ok(Poll::Pending) => {\n                // 다시 폴링\n            }\n            Err(e) => {\n                // 오류 처리\n            }\n        }\n    }\n}\n```\n\n---\n\n## 7. **핀과 폴링을 피하는 경우**\n- **`Future`를 핀하지 않는 경우**:\n  - `Future`가 `&mut self`를 참조하면 Rust는 컴파일 오류를 발생시킵니다.\n  - 따라서 `pin!` 매크로나 `Pin::new`을 사용해야 합니다.\n\n- **폴링을 직접 제어하지 않는 경우**:\n  - Tokio는 자동으로 폴링을 처리하므로 직접 폴링을 강제하지 않습니다.\n  - `tokio::task::yield_now()`은 이벤트 루프를 강제로 폴링합니다.\n\n---\n\n## 8. **요약**\n| 개념          | 설명                                                                 |\n|---------------|-----------------------------------------------------------------------|\n| **Tokio**     | Rust의 비동기 런타임으로 이벤트 루프를 기반으로 동작.              |\n| **폴링(polling)** | Tokio가 주기적으로 `Future`의 상태를 체크하여 완료된 작업을 실행. |\n| **핀(p", "model_used": "openrouter/mistralai/ministral-3b-2512", "response_summary_html": "Rust의 &#96;async/await&#96; 패턴과 Tokio 런타임의 동작 원리는 **비동기 프로그래밍**을 효율적으로 구현하기 위해 설계된    |\n| **폴링(polling)** | Tokio가 주기적으로 &#96;Future&#96;의 상태를 체크하여 완료된 작업을 실행. |\n\n### **이점**\n1. **Rust의 타입 시스템을 준수** → &#96;Future&#96;가 &#96;&amp;mut self&#96;를 참조하지 않음.\n2. **효율적인 이벤트 루프** → 폴링을 통해 비동기 작업을 처리.\n3. **비동기 코루틴을 지원** → &#96;async/await&#96;를 통해 간편한 비동기 코딩 가능.\n\n---\n\n## 6. **실제 Tokio의 폴링 과정**\nTokio의 이벤트 루프는 다음과 같이 동작합니다:\n\n1. **작업 큐에 추가** → &#96;tokio::spawn&#96;이나 &#96;tokio::task::spawn_local&#96;으로 핀된 &#96;Future&#96;가 추가됨.\n2. **폴링 루프**:\n   - 루프가 시작될 때, 모든 핀된 &#96;Future&#96;를 폴링합니다.\n   - &#96;Poll::Pending&#96; → 작업이 완료되지 않음 → 다시 폴링.\n   - &#96;Poll::Ready&#96; → 작업이 완료 → 콜백이 실행됨.\n3. **완료된 작업 처리** → 콜백이 실행되고, 다음 작업이 폴링됨.\n\n### **예시: Tokio의 이벤트 루프 구조**\n&#96;&#96;&#96;rust\n// Tokio의 이벤트 루프는 다음과 같이 동작\nloop {\n    for future in futures::pin_mut!(futures::stream::iter(\n        // 핀된 Future들을 가져옴\n    )) {\n        match future.poll() {\n            Ok(Poll::Ready(value)) =&gt; {\n                // 완료된 작업 실행\n                let result = future.unwrap();\n                // 콜백 실행\n            }\n            Ok(Poll::Pending) =&gt; {\n                // 다시 폴링\n            }\n            Err(e) =&gt; {\n                // 오류 처리\n            }\n        }\n    }\n}\n&#96;&#96;&#96;\n\n---\n\n## 7. **핀과 폴링을 피하는 경우**\n- **&#96;Future&#96;를 핀하지 않는 경우**:\n  - &#96;Future&#96;가 &#96;&amp;mut self&#96;를 참조하면 Rust는 컴파일 오류를 발생시킵니다.\n  - 따라서 &#96;pin!&#96; 매크로나 &#96;Pin::new&#96;을 사용해야 합니다.\n\n- **폴링을 직접 제어하지 않는 경우**:\n  - Tokio는 자동으로 폴링을 처리하므로 직접 폴링을 강제하지 않습니다.\n  - &#96;tokio::task::yield_now()&#96;은 이벤트 루프를 강제로 폴링합니다.\n\n---\n\n## 8. **요약**\n| 개념          | 설명                                                                 |\n|---------------|-----------------------------------------------------------------------|\n| **Tokio**     | Rust의 비동기 런타임으로 이벤트 루프를 기반으로 동작.              |\n| **폴링(polling)** | Tokio가 주기적으로 &#96;Future&#96;의 상태를 체크하여 완료된 작업을 실행. |\n| **핀(p", "masked_text_html": "Rust에서 async/await 패턴과 Tokio 런타임의 동작 원리를 설명해줘. 특히 핀(pin)과 폴링(po .\n   - &#96;Poll::Pending&#96; → 작업이 완료되지 않음 → 다시 폴링.\n   - &#96;Poll::Ready&#96; → 작업이 완료 → 콜백이 실행됨.\n3. **완료된 작업 처리** → 콜백이 실행되고, 다음 작업이 폴링됨.\n\n### **예시: Tokio의 이벤트 루프 구조**\n&#96;&#96;&#96;rust\n// Tokio의 이벤트 루프는 다음과 같이 동작\nloop {\n    for future in futures::pin_mut!(futures::stream::iter(\n        // 핀된 Future들을 가져옴\n    )) {\n        match future.poll() {\n            Ok(Poll::Ready(value)) =&gt; {\n                // 완료된 작업 실행\n                let result = future.unwrap();\n                // 콜백 실행\n            }\n            Ok(Poll::Pending) =&gt; {\n                // 다시 폴링\n            }\n            Err(e) =&gt; {\n                // 오류 처리\n            }\n        }\n    }\n}\n&#96;&#96;&#96;\n\n---\n\n## 7. **핀과 폴링을 피하는 경우**\n- **&#96;Future&#96;를 핀하지 않는 경우**:\n  - &#96;Future&#96;가 &#96;&amp;mut self&#96;를 참조하면 Rust는 컴파일 오류를 발생시킵니다.\n  - 따라서 &#96;pin!&#96; 매크로나 &#96;Pin::new&#96;을 사용해야 합니다.\n\n- **폴링을 직접 제어하지 않는 경우**:\n  - Tokio는 자동으로 폴링을 처리하므로 직접 폴링을 강제하지 않습니다.\n  - &#96;tokio::task::yield_now()&#96;은 이벤트 루프를 강제로 폴링합니다.\n\n---\n\n## 8. **요약**\n| 개념          | 설명                                                                 |\n|---------------|-----------------------------------------------------------------------|\n| **Tokio**     | Rust의 비동기 런타임으로 이벤트 루프를 기반으로 동작.              |\n| **폴링(polling)** | Tokio가 주기적으로 &#96;Future&#96;의 상태를 체크하여 완료된 작업을 실행. |\n| **핀(p", "masked_text": "Rust에서 async/await 패턴과 Tokio 런타임의 동작 원리를 설명해줘. 특히 핀(pin)과 폴링(polling) 개념을 중심으로 설명 부탁해."}, {"prompt_id": 21, "prompt": "Git에서 rebase와 merge의 차이점과 각각의 장단점, 적절한 사용 시나리오를 설명해주세요.", "is_sensitive": false, "policy_action": "route_to_external", "records": [], "response_summary": "Git에서 **`rebase`**와 **`merge`**는 브랜치 병합을 위한 두 가지 주요 방법입니다. 각각의 차이점, 장단점, 그리고 적절한 사용 시나리오를 설명하겠습니다.\n\n---\n\n## **1. `rebase` vs `merge`의 주요 차이점**\n| 특징               | `rebase`                          | `merge`                          |\n|----------------------|------------------------------------|----------------------------------|\n| **기본 동작**       | 브랜치 내의 커밋을 원래 브랜치에 재실행 (선형 히스토리 생성) | 두 브랜치의 최신 커밋을 병합 (분기된 히스토리 유지) |\n| **히스토리 구조**  | 선형 (직선적)                     | 분기된 (Y-형)                   |\n| **커밋 메시지**     | 원래 커밋 메시지가 변경됨 (리바이어링) | 원본 커밋 메시지가 그대로 남음 |\n| **공유 커밋**       | 각 커밋이 독립적으로 기록됨 (선형) | 한 번의 병합 커밋이 추가됨 |\n| **충돌 처리**      | 각 커밋별로 해결해야 함            | 병합 커밋에서 해결해야 함 |\n| **공유 브랜치**     | 다른 팀원에게 영향을 미침 (브랜치 재구성) | 브랜치 구조가 그대로 유지됨 |\n| **사용 시점**       | 개인 브랜치 작업 후 공유할 때 | 공유된 브랜치에서 다른 브랜치 병합 시 |\n\n---\n\n## **2. `rebase`의 장단점**\n### **✅ 장점**\n1. **선형 히스토리** → 브랜치 내의 커밋이 원본 브랜치에 재실행되어 더 clean한 히스토리 생성.\n   - `git log --graph`로 볼 때 직선적 구조가 더 직관적.\n2. **커밋 메시지 변경 가능** → 리바이어링하여 더 명확한 커밋 메시지를 만들 수 있음.\n3. **충돌 처리 효율적** → 각 커밋별로 충돌을 해결할 수 있어 작은 변경 사항에 더 적합.\n4. **공유 브랜치에 적합** → 팀원들과 공유할 때 히스토리가 clean해짐.\n\n### **❌ 단점**\n1. **브랜치 재구성** → `rebase`를 실행하면 브랜치의 커밋이 재작성되므로 다른 팀원에게 영향을 미침.\n   - `git push --force`가 필요해질 수 있음.\n2. **충돌 해결의 반복** → 각 커밋별로 충돌을 해결해야 하므로 복잡한 변경 사항에는 부적합.\n3. **공유 시 주의가 필요** → 다른 팀원이 이미 병합한 브랜치에 `rebase`를 적용하면 히스토리 혼란을 초래할 수 있음.\n\n---\n\n## **3. `merge`의 장단점**\n### **✅ 장점**\n1. **히스토리 보존** → 분기된 히스토리를 유지하여 팀원들과 공유할 때 혼란을 줄임.\n2. **단순한 충돌 처리** → 병합 커밋에서 모든 충돌을 해결해야 하므로 큰 변경 사항에 적합.\n3. **공유 브랜치에 안전** → 다른 팀원이 이미 병합한 브랜치에 `merge`를 적용해도 안전.\n4. **커밋 메시지 유지** → 원본 커밋 메시지가 그대로 유지되어 히스토리 추적이 용이.\n\n### **❌ 단점**\n1. **분기된 히스토리** → `git log --graph`로 볼 때 복잡한 구조가 발생할 수 있음.\n2. **병합 커밋의 부담** → 한 번의 병합 커밋이 추가되어 히스토리 추적에 불편할 수 있음.\n3. **충돌 해결의 한계** → 모든 충돌을 병합 커밋에서 해결해야 하므로 작은 변경 사항에는 부적합.\n\n---\n\n## **4. 적절한 사용 시나리오**\n### **`rebase`를 사용할 때**\n✔ **개인 브랜치 작업 후 공유할 때**\n   - 자신의 작업 브랜치를 `main`/`master`로 `rebase`하여 clean한 히스토리로 공유.\n   - 예: `git checkout feature-branch && git rebase main`\n\n✔ **작업이 작은 변경 사항일 때**\n   - 각 커밋별로 충돌을 해결하기 쉽기 때문에 작은 기능 개발에 적합.\n\n✔ **팀 협업에서 히스토리 청소 필요할 때**\n   - 이미 병합된 브랜치에 `rebase`를 적용하지 않고, 새로운 브랜치에서 작업 후 `rebase`로 통합.\n\n✔ **리포지토리 히스토리를 직선화할 때**\n   - 여러 브랜치에서 작업한 후 모든 커밋을 `main`으로 `rebase`하여 선형 히스토리 만들기.\n\n### **`merge`를 사용할 때**\n✔ **공유 브랜치에서 다른 브랜치 병합할 때**\n   - `main` 브랜치에 다른 브랜치의 변경 사항을 병합할 때 `merge`를 사용.\n\n✔ **대규모 변경 사항 또는 복잡한 충돌 처리**\n   - 큰 기능 개발이나 여러 팀원이 참여한 프로젝트에서 `merge`가 더 안전.\n\n✔ **팀 협업에서 히스토리 보존이 중요할 때**\n   - 다른 팀원이 이미 병합한 브랜치에 `merge`를 적용해도 안전하게 병합 가능.\n\n✔ **커밋 메시지를 그대로 유지해야 할 때**\n   - 히스토리 추적에 중요한 커밋 메시지를 변경하지 않기 위해 `merge`를 사용.\n\n---\n\n## **5. 실무에서 권장하는 방식**\n| 상황 | 권장 방법 |\n|------|------------|\n| **개인 브랜치 작업 후 공유** | `rebase` (clean한 히스토리) |\n| **공유 브랜치에서 병합** | `merge` (히스토리 보존) |\n| **작업이 작은 변경 사항** | `rebase` |\n| **작업이 큰 변경 사항 또는 충돌이 많음** | `merge` |\n| **팀 협업에서 히스토리 혼란을 피하려면** | `rebase`를 사용해 clean한 히스토리 유지, `merge`를 사용해 공유 브랜치 병합 |\n\n### **추천 workflow**\n1. **개발자** → 자신의 브랜치에서 작업 → `rebase`로 `main`/`master`로 통합.\n2. **팀원** → 공유 브랜치에서 `merge`로 다른 브랜치 통합.\n3. **리뷰어** → `rebase`를 사용해 히스토리 청소 후 PR 생성.\n\n---\n\n## **6. 예제 코드**\n### **`rebase` 예제**\n```bash\n# feature-branch에서 main으로 rebase\ngit checkout feature-branch\ngit rebase main\n\n# 충돌 발생 시 해결 후\ngit add .\ngit rebase --continue\n\n# 완료 후 push (force push 필요)\ngit push --force-with-lease\n```\n\n### **`merge` 예제**\n```bash\n# main 브랜치에서 feature-branch 병합\ngit checkout main\ngit merge feature-branch\n\n# 충돌 발생 시 해결 후\ngit add .\ngit commit -m \"Merge feature-branch into main\"\n```\n\n---\n\n## **7. 요약**\n| 방법 | 히스토리 구조 | 충돌 처리 | 공유 시 주의 | 적합한 경우 |\n|-------|----------------|------------|--------------|--------------|\n| **`rebase`** | 선형 | 각 커밋별 | 브랜치 재구성 필요 | 개인 브랜치 작업 후 공유, 작은 변경 사항 |\n| **`merge`** | 분기 | 병합 커밋 | 안전 | 공유 브랜치 병합, 큰 변경 사항, 팀 협업 |\n\n**결론**\n- **개발자** → `rebase`를 사용해 clean한 히스토리 유지.\n- **팀 협업** → `merge`를 사용해 히스토리 보존.\n- **충돌이 많을 때** → `merge`가 더 안전.\n- **작업이 작은 것** → `rebase`가 더 효율적.\n\nGit의 히스토리 관리 방식은 프로젝트 요구 사항에 따라 적절히 선택해야 합니다! 🚀", "model_used": "openrouter/mistralai/ministral-3b-2512", "response_summary_html": "Git에서 **&#96;rebase&#96;**와 **&#96;merge&#96;**는 브랜치 병합을 위한 두 가지 주요 방법입니다. 각각의 차이점, 장단점, 그리고 적절한 사용 시나리오를 설명하겠습니다.\n\n---\n\n## **1. &#96;rebase&#96; v erge`를 적용해도 안전.\n4. **커밋 메시지 유지** → 원본 커밋 메시지가 그대로 유지되어 히스토리 추적이 용이.\n\n### **❌ 단점**\n1. **분기된 히스토리** → `git log --graph`로 볼 때 복잡한 구조가 발생할 수 있음.\n2. **병합 커밋의 부담** → 한 번의 병합 커밋이 추가되어 히스토리 추적에 불편할 수 있음.\n3. **충돌 해결의 한계** → 모든 충돌을 병합 커밋에서 해결해야 하므로 작은 변경 사항에는 부적합.\n\n---\n\n## **4. 적절한 사용 시나리오**\n### **`rebase`를 사용할 때**\n✔ **개인 브랜치 작업 후 공유할 때**\n   - 자신의 작업 브랜치를 `main`/`master`로 `rebase`하여 clean한 히스토리로 공유.\n   - 예: `git checkout feature-branch && git rebase main`\n\n✔ **작업이 작은 변경 사항일 때**\n   - 각 커밋별로 충돌을 해결하기 쉽기 때문에 작은 기능 개발에 적합.\n\n✔ **팀 협업에서 히스토리 청소 필요할 때**\n   - 이미 병합된 브랜치에 `rebase`를 적용하지 않고, 새로운 브랜치에서 작업 후 `rebase`로 통합.\n\n✔ **리포지토리 히스토리를 직선화할 때**\n   - 여러 브랜치에서 작업한 후 모든 커밋을 `main`으로 `rebase`하여 선형 히스토리 만들기.\n\n### **`merge`를 사용할 때**\n✔ **공유 브랜치에서 다른 브랜치 병합할 때**\n   - `main` 브랜치에 다른 브랜치의 변경 사항을 병합할 때 `merge`를 사용.\n\n✔ **대규모 변경 사항 또는 복잡한 충돌 처리**\n   - 큰 기능 개발이나 여러 팀원이 참여한 프로젝트에서 `merge`가 더 안전.\n\n✔ **팀 협업에서 히스토리 보존이 중요할 때**\n   - 다른 팀원이 이미 병합한 브랜치에 `merge`를 적용해도 안전하게 병합 가능.\n\n✔ **커밋 메시지를 그대로 유지해야 할 때**\n   - 히스토리 추적에 중요한 커밋 메시지를 변경하지 않기 위해 `merge`를 사용.\n\n---\n\n## **5. 실무에서 권장하는 방식**\n| 상황 | 권장 방법 |\n|------|------------|\n| **개인 브랜치 작업 후 공유** | `rebase` (clean한 히스토리) |\n| **공유 브랜치에서 병합** | `merge` (히스토리 보존) |\n| **작업이 작은 변경 사항** | `rebase` |\n| **작업이 큰 변경 사항 또는 충돌이 많음** | `merge` |\n| **팀 협업에서 히스토리 혼란을 피하려면** | `rebase`를 사용해 clean한 히스토리 유지, `merge`를 사용해 공유 브랜치 병합 |\n\n### **추천 workflow**\n1. **개발자** → 자신의 브랜치에서 작업 → `rebase`로 `main`/`master`로 통합.\n2. **팀원** → 공유 브랜치에서 `merge`로 다른 브랜치 통합.\n3. **리뷰어** → `rebase`를 사용해 히스토리 청소 후 PR 생성.\n\n---\n\n## **6. 예제 코드**\n### **`rebase` 예제**\n```bash\n# feature-branch에서 main으로 rebase\ngit checkout feature-branch\ngit rebase main\n\n# 충돌 발생 시 해결 후\ngit add .\ngit rebase --continue\n\n# 완료 후 push (force push 필요)\ngit push --force-with-lease\n```\n\n### **`merge` 예제**\n```bash\n# main 브랜치에서 feature-branch 병합\ngit checkout main\ngit merge feature-branch\n\n# 충돌 발생 시 해결 후\ngit add .\ngit commit -m \"Merge feature-branch into main\"\n```\n\n---\n\n## **7. 요약**\n| 방법 | 히스토리 구조 | 충돌 처리 | 공유 시 주의 | 적합한 경우 |\n|-------|----------------|------------|--------------|--------------|\n| **`rebase`** | 선형 | 각 커밋별 | 브랜치 재구성 필요 | 개인 브랜치 작업 후 공유, 작은 변경 사항 |\n| **`merge`** | 분기 | 병합 커밋 | 안전 | 공유 브랜치 병합, 큰 변경 사항, 팀 협업 |\n\n**결론**\n- **개발자** → `rebase`를 사용해 clean한 히스토리 유지.\n- **팀 협업** → `merge`를 사용해 히스토리 보존.\n- **충돌이 많을 때** → `merge`가 더 안전.\n- **작업이 작은 것** → `rebase`가 더 효율적.\n\nGit의 히스토리 관리 방식은 프로젝트 요구 사항에 따라 적절히 선택해야 합니다! 🚀", "response_raw_html": "Git에서 **&#96;rebase&#96;**와 **&#96;merge&#96;**는 브랜치 병합을 위한 두 가지 주요 방법입니다. 각각의 차이점, 장단점, 그리고 적절한 사용 시나리오를 설명하겠습니다.\n\n---\n\n## **1. &#96;rebase&#96; vs &#96;merge&#96;의 주요 차이점**\n| 특징               | &#96;rebase&#96;                          | &#96;merge&#96;                          |\n|----------------------|------------------------------------|----------------------------------|\n| **기본 동작**       | 브랜치 내의 커밋을 원래 브랜치에 재실행 (선형 히스토리 생성) | 두 브랜치의 최신 커밋을 병합 (분기된 히스토리 유지) |\n| **히스토리 구조**  | 선형 (직선적)                     | 분기된 (Y-형)                   |\n| **커밋 메시지**     | 원래 커밋 메시지가 변경됨 (리바이어링) | 원본 커밋 메시지가 그대로 남음 |\n| **공유 커밋**       | 각 커밋이 독립적으로 기록됨 (선형) | 한 번의 병합 커밋이 추가됨 |\n| **충돌 처리**      | 각 커밋별로 해결해야 함            | 병합 커밋에서 해결해야 함 |\n| **공유 브랜치**     | 다른 팀원에게 영향을 미침 (브랜치 재구성) | 브랜치 구조가 그대로 유지됨 |\n| **사용 시점**       | 개인 브랜치 작업 후 공유할 때 | 공유된 브랜치에서 다른 브랜치 병합 시 |\n\n---\n\n## **2. &#96;rebase&#96;의 장단점**\n### **✅ 장점**\n1. **선형 히스토리** → 브랜치 내의 커밋이 원본 브랜치에 재실행되어 더 clean한 히스토리 생성.\n   - &#96;git log --graph&#96;로 볼 때 직선적 구조가 더 직관적.\n2. **커밋 메시지 변경 가능** → 리바이어링하여 더 명확한 커밋 메시지를 만들 수 있음.\n3. **충돌 처리 효율적** → 각 커밋별로 충돌을 해결할 수 있어 작은 변경 사항에 더 적합.\n4. **공유 브랜치에 적합** → 팀원들과 공유할 때 히스토리가 clean해짐.\n\n### **❌ 단점**\n1. **브랜치 재구성** → &#96;rebase&#96;를 실행하면 브랜치의 커밋이 재작성되므로 다른 팀원에게 영향을 미침.\n   - &#96;git push --force&#96;가 필요해질 수 있음.\n2. **충돌 해결의 반복** → 각 커밋별로 충돌을 해결해야 하므로 복잡한 변경 사항에는 부적합.\n3. **공유 시 주의가 필요** → 다른 팀원이 이미 병합한 브랜치에 &#96;rebase&#96;를 적용하면 히스토리 혼란을 초래할 수 있음.\n\n---\n\n## **3. &#96;merge&#96;의 장단점**\n### **✅ 장점**\n1. **히스토리 보존** → 분기된 히스토리를 유지하여 팀원들과 공유할 때 혼란을 줄임.\n2. **단순한 충돌 처리** → 병합 커밋에서 모든 충돌을 해결해야 하므로 큰 변경 사항에 적합.\n3. **공유 브랜치에 안전** → 다른 팀원이 이미 병합한 브랜치에 &#96;merge&#96;를 적용해도 안전.\n4. **커밋 메시지 유지** → 원본 커밋 메시지가 그대로 유지되어 히스토리 추적이 용이.\n\n### **❌ 단점**\n1. **분기된 히스토리** → &#96;git log --graph&#96;로 볼 때 복잡한 구조가 발생할 수 있음.\n2. **병합 커밋의 부담** → 한 번의 병합 커밋이 추가되어 히스토리 추적에 불편할 수 있음.\n3. **충돌 해결의 한계** → 모든 충돌을 병합 커밋에서 해결해야 하므로 작은 변경 사항에는 부적합.\n\n---\n\n## **4. 적절한 사용 시나리오**\n### **&#96;rebase&#96;를 사용할 때**\n✔ **개인 브랜치 작업 후 공유할 때**\n   - 자신의 작업 브랜치를 &#96;main&#96;/&#96;master&#96;로 &#96;rebase&#96;하여 clean한 히스토리로 공유.\n   - 예: &#96;git checkout feature-branch &amp;&amp; git rebase main&#96;\n\n✔ **작업이 작은 변경 사항일 때**\n   - 각 커밋별로 충돌을 해결하기 쉽기 때문에 작은 기능 개발에 적합.\n\n✔ **팀 협업에서 히스토리 청소 필요할 때**\n   - 이미 병합된 브랜치에 &#96;rebase&#96;를 적용하지 않고, 새로운 브랜치에서 작업 후 &#96;rebase&#96;로 통합.\n\n✔ **리포지토리 히스토리를 직선화할 때**\n   - 여러 브랜치에서 작업한 후 모든 커밋을 &#96;main&#96;으로 &#96;rebase&#96;하여 선형 히스토리 만들기.\n\n### **&#96;merge&#96;를 사용할 때**\n✔ **공유 브랜치에서 다른 브랜치 병합할 때**\n   - &#96;main&#96; 브랜치에 다른 브랜치의 변경 사항을 병합할 때 &#96;merge&#96;를 사용.\n\n✔ **대규모 변경 사항 또는 복잡한 충돌 처리**\n   - 큰 기능 개발이나 여러 팀원이 참여한 프로젝트에서 &#96;merge&#96;가 더 안전.\n\n✔ **팀 협업에서 히스토리 보존이 중요할 때**\n   - 다른 팀원이 이미 병합한 브랜치에 &#96;merge&#96;를 적용해도 안전하게 병합 가능.\n\n✔ **커밋 메시지를 그대로 유지해야 할 때**\n   - 히스토리 추적에 중요한 커밋 메시지를 변경하지 않기 위해 &#96;merge&#96;를 사용.\n\n---\n\n## **5. 실무에서 권장하는 방식**\n| 상황 | 권장 방법 |\n|------|------------|\n| **개인 브랜치 작업 후 공유** | &#96;rebase&#96; (clean한 히스토리) |\n| **공유 브랜치에서 병합** | &#96;merge&#96; (히스토리 보존) |\n| **작업이 작은 변경 사항** | &#96;rebase&#96; |\n| **작업이 큰 변경 사항 또는 충돌이 많음** | &#96;merge&#96; |\n| **팀 협업에서 히스토리 혼란을 피하려면** | &#96;rebase&#96;를 사용해 clean한 히스토리 유지, &#96;merge&#96;를 사용해 공유 브랜치 병합 |\n\n### **추천 workflow**\n1. **개발자** → 자신의 브랜치에서 작업 → &#96;rebase&#96;로 &#96;main&#96;/&#96;master&#96;로 통합.\n2. **팀원** → 공유 브랜치에서 &#96;merge&#96;로 다른 브랜치 통합.\n3. **리뷰어** → &#96;rebase&#96;를 사용해 히스토리 청소 후 PR 생성.\n\n---\n\n## **6. 예제 코드**\n### **&#96;rebase&#96; 예제**\n&#96;&#96;&#96;bash\n# feature-branch에서 main으로 rebase\ngit checkout feature-branch\ngit rebase main\n\n# 충돌 발생 시 해결 후\ngit add .\ngit rebase --continue\n\n# 완료 후 push (force push 필요)\ngit push --force-with-lease\n&#96;&#96;&#96;\n\n### **&#96;merge&#96; 예제**\n&#96;&#96;&#96;bash\n# main 브랜치에서 feature-branch 병합\ngit checkout main\ngit merge feature-branch\n\n# 충돌 발생 시 해결 후\ngit add .\ngit commit -m &quot;Merge feature-branch into main&quot;\n&#96;&#96;&#96;\n\n---\n\n## **7. 요약**\n| 방법 | 히스토리 구조 | 충돌 처리 | 공유 시 주의 | 적합한 경우 |\n|-------|----------------|------------|--------------|--------------|\n| **&#96;rebase&#96;** | 선형 | 각 커밋별 | 브랜치 재구성 필요 | 개인 브랜치 작업 후 공유, 작은 변경 사항 |\n| **&#96;merge&#96;** | 분기 | 병합 커밋 | 안전 | 공유 브랜치 병합, 큰 변경 사항, 팀 협업 |\n\n**결론**\n- **개발자** → &#96;rebase&#96;를 사용해 clean한 히스토리 유지.\n- **팀 협업** → &#96;merge&#96;를 사용해 히스토리 보존.\n- **충돌이 많을 때** → &#96;merge&#96;가 더 안전.\n- **작업이 작은 것** → &#96;rebase&#96;가 더 효율적.\n\nGit의 히스토리 관리 방식은 프로젝트 요구 사항에 따라 적절히 선택해야 합니다! 🚀", "masked_text": ""}, {"prompt_id": 22, "prompt": "SQL에서 인덱스의 동작 원리와 성능 최적화 방법을 설명해주세요. B-tree 인덱스와 해시 인덱스의 차이도 포함해주세요.", "is_sensitive": true, "policy_action": "mask_and_send", "records": [{"category": "SQL_INDEX_PERFORMANCE_METHODOLOGY", "span": "인덱스의 동작 원리", "confidence": 0.95, "is_essential": false}, {"category": "SQL_INDEX_TYPE_COMPARISON", "span": "B-tree 인덱스와 해시 인덱스의 차이", "confidence": 0.92, "is_essential": false}], "response_summary": "# SQL 인덱스 성능 최적화 및 비교 방법론\n\n## 1. 인덱스의 동작 원리 (인덱스 성능 분석 방법론)\n\n### 인덱스 성능 평가 단계\n1. **성능 측정**\n   - 쿼리 실행 계획 분석: `EXPLAIN` 또는 `EXPLAIN ANALYZE`를 사용하여 실행 계획 확인\n   - 인덱스 사용 여부 확인: `SELECT /*+ INDEX */` 또는 `EXPLAIN`에서 `Using index` 확인\n\n2. **인덱스 유형 평가**\n   - B-tree 인덱스 (기본): 데이터 순서에 따라 정렬된 키 기반 접근\n   - Hash 인덱스: 해시 기반 접근 (읽기 전용, 동일 키 검색에 최적화)\n   - Full-text 인덱스: 텍스트 검색에 최적화\n   - Spatial 인덱스: 지리적 위치 데이터에 최적화\n\n3. **인덱스 선택 기준**\n   - **접근 패턴 분석**: WHERE, JOIN, ORDER BY, GROUP BY에서 인덱스가 사용되는지 확인\n   - **카디널리티 분석**: 인덱스 컬럼의 고유도 (중복된 값의 비율)\n   - **통계 정보**: `pg_stat_user_indexes` 또는 `INFORMATION_SCHEMA.STATISTICS` 확인\n\n4. **성능 문제 진단**\n   - Full Table Scan 발생시: 인덱스 생성 또는 쿼리 최적화 필요\n   - 인덱스 스캔이 너무 많은 데이터 처리: 인덱스 컬럼 선택 개선\n   - 인덱스 크기 과잉: 불필요한 인덱스 제거\n\n5. **성능 테스트**\n   - 인덱스 추가/삭제 후 성능 비교: `pgbench` 또는 실제 트래픽 환경 테스트\n   - 동시성 영향 평가: 트랜잭션 수와 인덱스 성능 간의 관계\n\n## 2. B-tree 인덱스와 해시 인덱스의 차이 (인덱스 유형 비교)\n\n### 주요 인덱스 유형 비교\n\n| **인덱스 유형** | **특징** | **최적화 조건** | **성능 특징** | **사용 시나리오** |\n|----------------|-----------|------------------|----------------|-------------------|\n| **B-tree** | - 기본 인덱스 유형 <br> - 정렬된 데이터에 기반한 이진 탐색 <br> - 모든 데이터 유형 지원 | - 주키 컬럼 <br> - WHERE, JOIN, ORDER BY에 사용 | - 최적의 읽기 성능 <br> - 쓰기 성능 중립 | - 기본 검색, 정렬, 범위 쿼리 <br> - 모든 데이터베이스에서 기본 |\n| **Hash** | - 해시 테이블 기반 <br> - 동일 키 검색에 최적화 <br> - 읽기 전용 | - 단일 컬럼 조회 <br> - WHERE 조건이 단일 값일 때 | - 단일 키 검색 최적화 <br> - 읽기 속도 빠름 <br> - 쓰기 성능 저하 | - 단일 값 검색 <br> - 대량 데이터 처리 <br> - 읽기 전용 쿼리 |\n| **Full-text** | - 텍스트 검색에 최적화 <br> - 자연어 처리 지원 | - 텍스트 데이터 <br> - LIKE '%text%' 패턴 | - 문서 검색 최적화 <br> - 검색 속도 빠름 | - 검색어 검색 <br> - 자연어 처리 <br> - 텍스트 데이터 |\n| **Spatial** | - 지리적 위치 데이터 <br> - 공간 데이터 검색 | - 지리 좌표 데이터 <br> - 범위 검색 | - 공간 데이터 최적화 <br> - 범위 검색 빠름 | - 지리 정보 검색 <br> - 위치 기반 서비스 <br> - 범위 쿼리 |\n| **Bitmap** | - 비트맵 인코딩 <br> - 매우 작은 데이터 집합에 최적화 | - 매우 작은 데이터 집합 <br> - 간단한 필터링 | - 작은 데이터 집합 최적화 <br> - 저장 공간 효율 | - 매우 작은 데이터 <br> - 비트 필터링 <br> - 정렬 필요 없음 |\n| **Composite** | - 여러 컬럼 조합으로 인덱스 <br> - 인덱스 파티션 | - 여러 컬럼 조합으로 검색 <br> - JOIN에 사용 | - 복합 검색 최적화 <br> - JOIN 성능 향상 | - 복합 검색 <br> - JOIN 연산 <br> - 정렬 필요 |\n\n### 인덱스 유형 최적화 전략\n1. **B-tree 인덱스 최적화**\n   - 적절한 컬럼 선택: WHERE 조건에 가장 많이 사용되는 컬럼부터\n   - 인덱스 파티션: 자주 조인되는 컬럼에 인덱스 파티션 적용\n   - 인덱스 스캔 최적화: `INDEXSCAN` 대신 `INDEXONLYSCAN` 사용\n\n2. **Hash 인덱스 최적화**\n   - 단일 값 검색에만 사용: WHERE 조건이 단일 값일 때\n   - 읽기 전용 쿼리에서만 사용: 쓰기 성능 저하 방지\n   - 비트맵 인덱스와 함께 사용: 복합 검색 시\n\n3. **Full-text 인덱스 최적화**\n   - 텍스트 데이터에만 사용: 숫자, 날짜 데이터는 사용하지 않음\n   - 검색 패턴 최적화: `LIKE '%text%'` 대신 `ILIKE` 사용\n   - 인덱 ; 확인\n   - SQL 쿼리 분석: &#96;EXPLAIN&#96;에서 인덱스 사용 여부 확인\n   - 트래픽 패턴 분석: 주기적 쿼리 vs 일시적 쿼리 구분\n\n2. **인덱스 관리**\n   - 인덱스 크기 모니터링: &#96;pg_stat_user_indexes&#96;에서 인덱스 크기 확인\n   - 인덱스 재구성: 인덱스 크기가 과도해지면 재구성 필요\n   - 인덱스 삭제: 사용되지 않는 인덱스 제거\n\n3. **성능 테스트**\n   - 인덱스 추가 전후 성능 비교: &#96;pgbench&#96; 또는 실제 트래픽 테스트\n   - 동시성 영향 평가: 트랜잭션 수와 성능 간의 관계\n   - 쿼리 최적화: 인덱스 사용을 위한 쿼리 재작성\n\n4. **기술 선택**\n   - 데이터베이스 선택에 따라 인덱스 유형 선택: MySQL은 Hash 인덱스 지원, PostgreSQL은 B-tree가 기본\n   - 인덱스 유형에 따른 저장 공간 고려: Hash 인덱스는 B-tree보다 저장 공간 효율적\n   - 동시성 요구에 따른 인덱스 선택: 읽기 전용 환경에서는 Hash 인덱스 사용 가능\n\n이러한 접근 방식과 비교를 통해 SQL 인덱스 성능을 최적화하고 데이터베이스 성능을 크게 향상시킬 수 있습니다.", "masked_text_html": "SQL에서 SQL_INDEX_PERFORMANCE_METHODOLOGY#35fe1669와 성능 최적화 방법을 설명해주세요. SQL_INDEX_TYPE_COMPARISON#cdc92116도 포함해주세요.", "response_raw": "# SQL 인덱스 성능 최적화 및 비교 방법론\n\n## 1. 인덱스의 동작 원리 (인덱스 성능 분석 방법론)\n\n### 인덱스 성능 평가 단계\n1. **성능 측정**\n   - 쿼리 실행 계획 분석: `EXPLAIN` 또는 `EXPLAIN ANALYZE`를 사용하여 실행 계획 확인\n   - 인덱스 사용 여부 확인: `SELECT /*+ INDEX */` 또는 `EXPLAIN`에서 `Using index` 확인\n\n2. **인덱스 유형 평가**\n   - B-tree 인덱스 (기본): 데이터 순서에 따라 정렬된 키 기반 접근\n   - Hash 인덱스: 해시 기반 접근 (읽기 전용, 동일 키 검색에 최적화)\n   - Full-text 인덱스: 텍스트 검색에 최적화\n   - Spatial 인덱스: 지리적 위치 데이터에 최적화\n\n3. **인덱스 선택 기준**\n   - **접근 패턴 분석**: WHERE, JOIN, ORDER BY, GROUP BY에서 인덱스가 사용되는지 확인\n   - **카디널리티 분석**: 인덱스 컬럼의 고유도 (중복된 값의 비율)\n   - **통계 정보**: `pg_stat_user_indexes` 또는 `INFORMATION_SCHEMA.STATISTICS` 확인\n\n4. **성능 문제 진단**\n   - Full Table Scan 발생시: 인덱스 생성 또는 쿼리 최적화 필요\n   - 인덱스 스캔이 너무 많은 데이터 처리: 인덱스 컬럼 선택 개선\n   - 인덱스 크기 과잉: 불필요한 인덱스 제거\n\n5. **성능 테스트**\n   - 인덱스 추가/삭제 후 성능 비교: `pgbench` 또는 실제 트래픽 환경 테스트\n   - 동시성 영향 평가: 트랜잭션 수와 인덱스 성능 간의 관계\n\n## 2. B-tree 인덱스와 해시 인덱스의 차이 (인덱스 유형 비교)\n\n### 주요 인덱스 유형 비교\n\n| **인덱스 유형** | **특징** | **최적화 조건** | **성능 특징** | **사용 시나리오** |\n|----------------|-----------|------------------|----------------|-------------------|\n| **B-tree** | - 기본 인덱스 유형 <br> - 정렬된 데이터에 기반한 이진 탐색 <br> - 모든 데이터 유형 지원 | - 주키 컬럼 <br> - WHERE, JOIN, ORDER BY에 사용 | - 최적의 읽기 성능 <br> - 쓰기 성능 중립 | - 기본 검색, 정렬, 범위 쿼리 <br> - 모든 데이터베이스에서 기본 |\n| **Hash** | - 해시 테이블 기반 <br> - 동일 키 검색에 최적화 <br> - 읽기 전용 | - 단일 컬럼 조회 <br> - WHERE 조건이 단일 값일 때 | - 단일 키 검색 최적화 <br> - 읽기 속도 빠름 <br> - 쓰기 성능 저하 | - 단일 값 검색 <br> - 대량 데이터 처리 <br> - 읽기 전용 쿼리 |\n| **Full-text** | - 텍스트 검색에 최적화 <br> - 자연어 처리 지원 | - 텍스트 데이터 <br> - LIKE '%text%' 패턴 | - 문서 검색 최적화 <br> - 검색 속도 빠름 | - 검색어 검색 <br> - 자연어 처리 <br> - 텍스트 데이터 |\n| **Spatial** | - 지리적 위치 데이터 <br> - 공간 데이터 검색 | - 지리 좌표 데이터 <br> - 범위 검색 | - 공간 데이터 최적화 <br> - 범위 검색 빠름 | - 지리 정보 검색 <br> - 위치 기반 서비스 <br> - 범위 쿼리 |\n| **Bitmap** | - 비트맵 인코딩 <br> - 매우 작은 데이터 집합에 최적화 | - 매우 작은 데이터 집합 <br> - 간단한 필터링 | - 작은 데이터 집합 최적화 <br> - 저장 공간 효율 | - 매우 작은 데이터 <br> - 비트 필터링 <br> - 정렬 필요 없음 |\n| **Composite** | - 여러 컬럼 조합으로 인덱스 <br> - 인덱스 파티션 | - 여러 컬럼 조합으로 검색 <br> - JOIN에 사용 | - 복합 검색 최적화 <br> - JOIN 성능 향상 | - 복합 검색 <br> - JOIN 연산 <br> - 정렬 필요 |\n\n### 인덱스 유형 최적화 전략\n1. **B-tree 인덱스 최적화**\n   - 적절한 컬럼 선택: WHERE 조건에 가장 많이 사용되는 컬럼부터\n   - 인덱스 파티션: 자주 조인되는 컬럼에 인덱스 파티션 적용\n   - 인덱스 스캔 최적화: `INDEXSCAN` 대신 `INDEXONLYSCAN` 사용\n\n2. **Hash 인덱스 최적화**\n   - 단일 값 검색에만 사용: WHERE 조건이 단일 값일 때\n   - 읽기 전용 쿼리에서만 사용: 쓰기 성능 저하 방지\n   - 비트맵 인덱스와 함께 사용: 복합 검색 시\n\n3. **Full-text 인덱스 최적화**\n   - 텍스트 데이터에만 사용: 숫자, 날짜 데이터는 사용하지 않음\n   - 검색 패턴 최적화: `LIKE '%text%'` 대신 `ILIKE` 사용\n   - 인덱스 크기 관리: 불필요한 텍스트 데이터 제거\n\n4. **Spatial 인덱스 최적화**\n   - 지리 좌표 데이터에만 사용: 숫자 데이터는 사용하지 않음\n   - 범위 검색 최적화: `ST_DWithin` 등 공간 함수 사용\n   - 인덱스 크기 관리: 불필요한 좌표 데이터 제거\n\n### 실무 최적화 팁\n1. **인덱스 선택 기준**\n   - 인덱스 사용 빈도 분석: `pg_stat_user_indexes` 확인\n   - SQL 쿼리 분석: `EXPLAIN`에서 인덱스 사용 여부 확인\n   - 트래픽 패턴 분석: 주기적 쿼리 vs 일시적 쿼리 구분\n\n2. **인덱스 관리**\n   - 인덱스 크기 모니터링: `pg_stat_user_indexes`에서 인덱스 크기 확인\n   - 인덱스 재구성: 인덱스 크기가 과도해지면 재구성 필요\n   - 인덱스 삭제: 사용되지 않는 인덱스 제거\n\n3. **성능 테스트**\n   - 인덱스 추가 전후 성능 비교: `pgbench` 또는 실제 트래픽 테스트\n   - 동시성 영향 평가: 트랜잭션 수와 성능 간의 관계\n   - 쿼리 최적화: 인덱스 사용을 위한 쿼리 재작성\n\n4. **기술 선택**\n   - 데이터베이스 선택에 따라 인덱스 유형 선택: MySQL은 Hash 인덱스 지원, PostgreSQL은 B-tree가 기본\n   - let dbData = null;
let currentFilter = 'all';

async function fetchDashboardData() {
    try {
        const resp = await fetch('/api/v1/dashboard-data');
        if (!resp.ok) throw new Error('API error');
        dbData = await resp.json();
        return true;
    } catch (e) { console.warn('API fetch failed:', e); return false; }
}

function eh(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\x60/g,'&#96;'); }

function actionBadge(a) {
    const m = {'route_to_local':['로컬 모델 호출','b-local'],'local_api':['로컬 모델 호출','b-local'],'mask_and_send':['마스킹 후 외부 라우팅','b-mask'],'external_api':['마스킹 후 외부 라우팅','b-ext'],'route_to_external':['안전 통과','b-safe']};
    const [l,c] = m[a]||[a,'b-ext'];
    return '<span class="badge '+c+'">'+l+'</span>';
}

function highlightSpans(prompt, records) {
    if (!records || records.length === 0) return eh(prompt);
    let r = eh(prompt);
    [...extraction_records].sort((a,b) => ((b.span||'').length - (a.span||'').length)).forEach(rec => {
        if (rec.span) { const esc = eh(rec.span); r = r.replace(esc, '<span class="ix-highlight" title="'+rec.category+' ('+((rec.confidence||0)*100).toFixed(0)+'%)">'+esc+'</span>'); }
    });
    return r;
}

function renderKPI(s) {
    document.getElementById('kpiCards').innerHTML =
        '<div class="card"><div class="card-hd">총 프롬프트</div><div class="card-v">'+s.total+'</div></div>'
        +'<div class="card"><div class="card-hd">민감 탐지</div><div class="card-v amber">'+s.sensitive+'</div></div>'
        +'<div class="card"><div class="card-hd">민감 정보 → 로컬 모델</div><div class="card-v blue">'+s.routed_local+'</div></div>'
        +'<div class="card"><div class="card-hd">마스킹 후 외부 라우팅</div><div class="card-v emerald">'+s.masked_sent+'</div></div>';
}

function renderCharts(daily) {
    const labels = daily.map(d=>d.date);
    const cd = {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{size:12}}}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#1e293b'}},y:{ticks:{color:'#94a3b8'},grid:{color:'#1e293b'},beginAtZero:true}}};
    new Chart(document.getElementById('dailyChart'),{type:'bar',data:{labels,datasets:[{label:'민감 탐지',data:daily.map(d=>d.sensitive),backgroundColor:'#fbbf24',borderRadius:4},{label:'안전 통과',data:daily.map(d=>d.safe),backgroundColor:'#34d399',borderRadius:4}]},options:cd});
    const at=daily.reduce((a,d)=>{a.l+=d.routed_local;a.m+=d.masked_sent;a.s+=d.allowed;return a},{l:0,m:0,s:0});
    new Chart(document.getElementById('actionChart'),{type:'doughnut',data:{labels:['민감 → 로컬 모델','마스킹 후 외부 라우팅','안전 통과 (외부 직접 전송)'],datasets:[{data:[at.l,at.m,at.s],backgroundColor:['#3b82f6','#10b981','#6b7280'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',padding:16}}}}});
    const tl=document.getElementById('timeline');
    daily.forEach(d=>{const lp=(d.routed_local/d.total*100).toFixed(0),mp=(d.masked_sent/d.total*100).toFixed(0),sp=(d.allowed/d.total*100).toFixed(0),op=100-parseInt(lp)-parseInt(mp)-parseInt(sp);
    tl.innerHTML+='<div class="tl-row"><div class="tl-date">'+d.date+'</div><div class="tl-bar"><div class="tl-seg seg-l" style="width:'+lp+'%">'+d.routed_local+'</div><div class="tl-seg seg-m" style="width:'+mp+'%">'+d.masked_sent+'</div><div class="tl-seg seg-s" style="width:'+Math.max(+sp,5)+'%">'+d.allowed+'</div>'+(op>0?'<div class="tl-seg" style="width:'+op+'%;background:#475569"></div>':'')+'</div><div style="width:40px;text-align:right;font-size:.8rem;color:#94a3b8">'+d.total+'</div></div>';});
}

function renderInteractions() {
    const list = document.getElementById('ixList');
    list.innerHTML = '';
    let cnt = 0;
    INTERACTIONS.forEach((ix,idx) => {
        if (currentFilter==='sensitive'&&!ix.is_sensitive) return;
        if (currentFilter==='safe'&&ix.is_sensitive) return;
        if (currentFilter==='local'&&!['route_to_local','local_api'].includes(ix.policy_action)) return;
        if (currentFilter==='masked'&&!['mask_and_send','external_api'].includes(ix.policy_action)) return;
        cnt++;
        const recs = ix.extraction_records||[];
        const preview = ix.prompt.length>80 ? ix.prompt.substring(0,80)+'...' : ix.prompt;
        const hasMasked = ix.masked_text_html && ix.masked_text_html.length>0;
        const hasRaw = ix.response_raw_html && ix.response_raw_html.length>0;
        const hasHydrated = ix.response_summary_html && ix.response_summary_html.length>0;
        const card = document.createElement('div');
        card.className = 'ix-card';
        card.innerHTML =
'<div class="ix-header" onclick="tog('+idx+')">'
+'<div class="ix-num">'+(idx+1)+'</div>'
+'<div class="ix-meta">'
+'<div class="ix-title">'+eh(preview)+'</div>'
+'<div class="ix-sub"><span>'+(ix.is_sensitive?'민감 탐지':'안전 통과')+'</span><span>'+recs.length+'건 탐지</span>'+(hasMasked?'<span>마스킹 적용</span>':'')+'</div>'
+'</div>'
+'<div class="ix-badges">'+(ix.is_sensitive?'<span class="badge b-sens">민감</span>':'<span class="badge b-safe">안전</span>')+actionBadge(ix.policy_action)+'</div>'
+'<svg class="ix-arrow" id="a-'+idx+'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>'
+'</div>'
+'<div class="ix-body" id="b-'+idx+'">'
+'<div class="ix-flow">'
+'<div class="ix-flow-step">📝 사용자 입력</div><div class="ix-flow-arrow">→</div>'
+'<div class="ix-flow-step">🔍 Extractor 탐지</div><div class="ix-flow-arrow">→</div>'
+'<div class="ix-flow-box">'+(ix.is_sensitive?'⚠️ '+recs.length+'건 민감 정보':'✅ 안전')+'</div><div class="ix-flow-arrow">→</div>'
+'<div class="ix-flow-step">'+actionBadge(ix.policy_action)+'</div><div class="ix-flow-arrow">→</div>'
+'<div class="ix-flow-step">💬 모델 응답</div>'
+'</div>'
+'<div class="ix-section"><div class="ix-label">입력 (사용자 프롬프트)</div><div class="ix-prompt">'+highlightSpans(ix.prompt,recs)+'</div></div>'
+(recs.length>0?'<div class="ix-section"><div class="ix-label">탐지된 민감 정보 ('+recs.length+'건)</div><div class="ix-records">'+recs.map(r=>'<div class="ix-record"><span class="cat">'+r.category+'</span><span class="span">"'+(r.span||'')+'"</span><span class="conf">'+((r.confidence||0)*100).toFixed(0)+'%</span><span class="ess '+(r.is_essential?'ess-true':'ess-false')+'">'+(r.is_essential?'마스킹 불가':'마스킹 가능')+'</span></div>').join('')+'</div></div>':'')
+(hasMasked?'<div class="ix-section"><div class="ix-label">마스킹된 입력 (외부 라우팅 전 텍스트)</div><div class="ix-masked">'+ix.masked_text_html+'</div></div>':'')
+(hasRaw?'<div class="ix-section"><div class="ix-label">출력 — 하이드레이션 전 (플레이스홀더 포함)</div><div class="ix-response-raw">'+ix.response_raw_html+'</div></div>':'')
+(hasHydrated?'<div class="ix-section"><div class="ix-label">출력 — 하이드레이션 후 (원본 복원)</div><div class="ix-response-hydrated">'+ix.response_summary_html+'</div></div>':'')
+'</div>';
        list.appendChild(card);
    });
    document.getElementById('ixCount').textContent = cnt+'건';
}

function tog(i) {
    document.getElementById('b-'+i).classList.toggle('open');
    document.getElementById('a-'+i).classList.toggle('open');
}

async function init() {
    const hasAPI = await fetchDashboardData();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    if (hasAPI && dbData) {
        renderKPI(dbData.summary);
        renderCharts(dbData.daily);
        document.querySelector('.subtitle').innerHTML = '실시간 DB 연동 ('+dbData.summary.total+'건 로그) · <a href="/documentation/logs" style="color:#60a5fa">← 문서로 돌아가기</a>';
    } else {
        const summary = {total:46,sensitive:31,safe:15,routed_local:9,masked_sent:37,allowed:0};
        const daily = [{"date": "06-17", "total": 46, "sensitive": 31, "safe": 15, "routed_local": 9, "masked_sent": 37, "allowed": 0}];
        renderKPI(summary);
        renderCharts(daily);
    }
    renderInteractions();
}

document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;renderInteractions();});});

init();
</script>
</body>
</html>
