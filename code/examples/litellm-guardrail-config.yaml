model_list:
  - model_name: "gpt-4o"
    litellm_params:
      model: "openrouter/openai/gpt-4o"
      api_key: "os.environ/OPENROUTER_API_KEY"

guardrails:
  - guardrail_name: privacy-router
    litellm_params:
      guardrail: generic_guardrail_api
      mode: pre_call
      api_base: http://privacy-router:8787/api/v1/guardrail
