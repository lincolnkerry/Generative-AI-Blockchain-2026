# OpenClaw standalone compose — Condition 3: Privacy Router pipeline
# Usage: COMPOSE_PROJECT_NAME=openclaw-exp docker compose -f docker-compose.openclaw-standalone.yml up -d
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: privacy_router
      POSTGRES_PASSWORD: privacy_router
      POSTGRES_DB: privacy_router
    ports:
      - "5435:5432"
    volumes:
      - openclaw-pgdata:/var/lib/postgresql/data
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privacy_router"]
      interval: 3s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8792:8787"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://privacy_router:privacy_router@db:5432/privacy_router
    volumes:
      - ./.privacy-router.config.yaml:/app/.privacy-router.config.yaml:ro
    networks:
      - openclaw-net
    depends_on:
      db:
        condition: service_healthy

  openclaw:
    build:
      context: .
      dockerfile: demo/openclaw/Dockerfile
    ports:
      - "18791:18789"
      - "18792:18790"
    volumes:
      - ./demo/openclaw/openclaw-privacy-router.json:/home/node/.openclaw/openclaw.json:ro
      - openclaw-data:/home/node/.openclaw
    environment:
      OPENCLAW_GATEWAY_TOKEN: "demo-token"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PRIVACY_ROUTER_URL: http://api:8787
      PRIVACY_ROUTER_API_KEY: "pr-demo-key"
    env_file: .env
    depends_on:
      - api
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge

volumes:
  openclaw-pgdata:
  openclaw-data:
