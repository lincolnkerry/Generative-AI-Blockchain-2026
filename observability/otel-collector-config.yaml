receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 512
    timeout: 5s

  # Privacy Router span에 service.name 태그 추가
  resource:
    attributes:
      - key: service.name
        value: "privacy-router"
        action: upsert

exporters:
  # ── Prometheus (metrics) ─────────────────────────────────────────────────
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: privacy_router
    const_labels:
      service: privacy-router

  # ── Loki (logs) ─────────────────────────────────────────────────────────
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  # ── Debug (stdout — 개발 시에만) ──────────────────────────────────────────
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [loki]
