# Promtail — scrapes Docker container logs and ships to Loki.
# 컨테이너 라벨 기반으로 privacy-router 관련 로그만 수집.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs ────────────────────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # privacy-router 네트워크에 속한 컨테이너만 수집
          - name: label
            values: ["com.docker.compose.project=privacy-router"]
    relabel_configs:
      # 컨테이너 이름을 job 라벨로
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: "container"
      # compose 서비스 이름
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      # 로그 레벨 파싱
      - source_labels: ["__meta_docker_container_label_logging_level"]
        target_label: "level"
    pipeline_stages:
      # JSON 로그 파싱 (uvicorn, logfire 등)
      - json:
          expressions:
            level: level
            msg: msg
            timestamp: timestamp
      - labels:
          level:

  # ── Privacy Router API 로그 (uvicorn access log) ─────────────────────────
  - job_name: privacy-router-api
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=privacy-router"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        regex: "api"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: "container"
    pipeline_stages:
      # uvicorn access log 포맷: INFO:     172.18.0.1:54321 - "POST /v1/chat/completions HTTP/1.1" 200
      - regex:
          expression: '.*"(?P<method>\w+) (?P<path>[^ ]+) HTTP/[^"]+" (?P<status>\d+)'
      - labels:
          method:
          path:
          status:
