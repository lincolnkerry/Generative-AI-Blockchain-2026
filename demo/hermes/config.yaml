# Hermes Agent configuration — Privacy Router + Telegram integration
# =============================================================================

# Custom OpenAI-compatible endpoint
# All LLM requests go through Privacy Router's privacy pipeline.
model:
  provider: custom
  base_url: http://api:8787/v1
  api_key: "pr-demo-key"
  default: "openrouter/google/gemini-3.1-flash-lite"

# Telegram channel
channels:
  telegram:
    enabled: true
    token: "TELEGRAM_TOKEN_REDACTED"
    dm_policy: open

# MCP Server (optional — for direct tool access)
mcp_servers:
  privacy-router:
    command: python
    args: ["-m", "server.mcp"]
    env:
      PRIVACY_ROUTER_URL: "http://api:8787"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"