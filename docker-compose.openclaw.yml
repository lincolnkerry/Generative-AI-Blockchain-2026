# OpenClaw + Privacy Router Demo
# Usage: docker compose -f docker-compose.yml -f docker-compose.openclaw.yml up -d
# =============================================================================
# Extends the main docker-compose.yml with an OpenClaw agent container.
# OpenClaw connects to Privacy Router as a custom OpenAI-compatible provider.
# =============================================================================

services:
  openclaw:
    build:
      context: .
      dockerfile: demo/openclaw/Dockerfile
    ports:
      - "18789:18789"
      - "18790:18790"
    volumes:
      - ./demo/openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - openclaw-data:/home/node/.openclaw
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-demo-token}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PRIVACY_ROUTER_URL: http://api:8787
    env_file: .env
    depends_on:
      - api
    networks:
      - backend
    restart: unless-stopped

volumes:
  openclaw-data:
