# Hermes Agent — Privacy Router as API Proxy
# All LLM calls route through Privacy Router (automatic PII protection)
# No MCP tools — protection is transparent at the API layer
# =============================================================================

model:
  provider: custom
  api_key: "pr-6i0hEMaqSSLwuHk5P08ect7h7_Gj3Xny1d24PFfkq1g"
  default: "openrouter/google/gemini-3.1-flash-lite"

channels:
  telegram:
    enabled: false

# No MCP servers — Privacy Router operates transparently as API proxy.
# Every chat/completions request passes through the pipeline automatically:
#   Extract → Judge → Mask → Route

# Browser automation
mcp_servers:
  browser:
    command: npx
    args: ["-y", "@playwright/mcp", "--headless"]

  filesystem:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]

memory:
  enabled: true
  backend: sqlite
  path: /root/.hermes/memory.db

skills:
  - agent-browser

hindsight:
  enabled: true
  max_entries: 1000
