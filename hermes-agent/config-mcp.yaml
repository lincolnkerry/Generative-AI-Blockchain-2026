# Hermes Agent — Privacy Router as MCP Tool
# LLM calls go directly to OpenRouter (no automatic protection)
# Privacy Router available as explicit MCP tools for the agent to call
# =============================================================================

model:
  provider: openrouter
  api_key: "${OPENROUTER_API_KEY}"
  default: "google/gemini-3.1-flash-lite"

channels:
  telegram:
    enabled: false

# MCP Servers — Privacy Router as a tool the agent can invoke explicitly
mcp_servers:
  # Privacy Router: classify, generate (mask+route) as needed
  privacy-router:
    command: python
    args: ["/opt/hermes/server/mcp/lightweight.py"]
    env:
      PRIVACY_ROUTER_URL: "http://api:8787"
      PRIVACY_ROUTER_API_KEY: "pr-demo-key"

  # Browser automation via Playwright
  browser:
    command: npx
    args: ["-y", "@playwright/mcp", "--headless"]

  # Filesystem access for workspace
  filesystem:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]

memory:
  enabled: true
  backend: sqlite
  path: /root/.hermes/memory.db

skills:
  - agent-browser

hindsight:
  enabled: true
  max_entries: 1000
